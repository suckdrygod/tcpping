name: Build TCP-safe agent

on:
  push:
    tags:
      - 'v*-safe.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out overlay repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Fetch pinned metric-only base
        run: |
          git clone https://gitlab.com/mr-potato/komari-agent.git upstream
          cd upstream
          git checkout --detach fc8179e316bd07d710213416d86e884e5c0e2c19
          git apply --check ../patches/0001-enable-constrained-tcp-ping.patch
          git apply ../patches/0001-enable-constrained-tcp-ping.patch
          grep -R --line-number --include='*.go' -E 'NewTask\(|establishTerminalConnection|StartTerminal' . && exit 1 || true
          gofmt -w cmd server
          go build ./...

      - name: Build Linux release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          mkdir -p dist
          cd upstream
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X github.com/komari-monitor/komari-agent/update.CurrentVersion=${VERSION}" \
              -o "../dist/komari-agent-linux-${arch}" .
          done
          cd ../dist
          sha256sum komari-agent-linux-* > SHA256SUMS

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/komari-agent-linux-amd64
            dist/komari-agent-linux-arm64
            dist/SHA256SUMS
